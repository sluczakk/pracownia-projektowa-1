
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: rce-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: rce-backend
    working_dir: /app
    expose:
      - "3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./backend/temp:/app/temp
      - sqlite-data:/home/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/home/data/database_testerumiejetnosciprogramowania.sqlite
      - HOST_TEMP_PATH=/home/data/temp/
      
  runcode-python:
    build:
      context: ./backend/docker-images/python
      dockerfile: Dockerfile
    image: runcode-python
    entrypoint: ["true"]  

  runcode-java:
    build:
      context: ./backend/docker-images/java
      dockerfile: Dockerfile
    image: runcode-java
    entrypoint: ["true"]

  runcode-cpp:
    build:
      context: ./backend/docker-images/cpp
      dockerfile: Dockerfile
    image: runcode-cpp
    entrypoint: ["true"]

volumes:
  frontend_node_modules:
  backend_node_modules:
  sqlite-data: